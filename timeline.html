<style>
.tl { position: relative; padding-left: 2.5rem; }
.tl::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 0; width: 2px; background: rgba(26,22,18,.15); }
.tl-entry { position: relative; margin-bottom: 3rem; }
.tl-entry::before { content: ''; position: absolute; left: -2.5rem; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--color-cherry); border: 2px solid var(--color-parchment); box-shadow: 0 0 0 2px var(--color-cherry); }
.tl-entry--edu::before { background: var(--color-bubblegum); box-shadow: 0 0 0 2px var(--color-bubblegum); }
.tl-entry--current::before { background: var(--color-cherry); box-shadow: 0 0 0 4px rgba(229,75,60,.2); }
.tl-date { font-family: var(--font-mono); font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: #888; margin-bottom: .4rem; }
.tl-role { font-family: var(--font-display); font-weight: 900; font-size: var(--text-xl); letter-spacing: -.02em; line-height: 1.1; margin-bottom: .25rem; }
.tl-org { font-size: var(--text-sm); font-weight: 600; color: var(--color-cherry); margin-bottom: .75rem; }
.tl-desc { font-size: var(--text-sm); line-height: 1.7; color: #3a3530; max-width: 60ch; }
.tl-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
.tl-tag { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .06em; padding: 2px 8px; border: 1px solid rgba(26,22,18,.2); border-radius: 100px; color: #6b6460; text-transform: uppercase; }
.tl-section-head { font-family: var(--font-mono); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--color-cherry); margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--color-ink); margin-top: 3.5rem; }
.tl-section-head:first-child { margin-top: 0; }
</style>
</head>

<script src="/data.js"></script>
