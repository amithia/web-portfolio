<style>
/* ── Timeline ──
   Marker column = 20px wide. Line centre = 10px from .tl left.
   .tl-title-row uses flex + align-items:center so the dot
   is always vertically centred on the role title — no offset math needed. */

.tl { position: relative; }

.tl::before {
  content: ''; position: absolute;
  left: 9px;           /* 10px centre − 1px for half of 2px line */
  top: 0; bottom: 0; width: 2px;
  background: rgba(26,22,18,.13);
}

.tl-entry { margin-bottom: 3.5rem; }

/* Date sits above the title row, indented to match the text column */
.tl-date {
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: .35rem;
  padding-left: calc(20px + 1.75rem);
}

/* Flex row: marker column (20 px) + role title — align-items:center does the work */
.tl-title-row {
  display: flex;
  align-items: center;
  gap: 1.75rem;
  margin-bottom: .3rem;
}

.tl-marker {
  width: 20px;
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
}

.tl-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: var(--color-cherry);
  border: 2px solid var(--color-parchment);
  box-shadow: 0 0 0 2px var(--color-cherry);
}

.tl-entry--edu     .tl-dot { background: var(--color-bubblegum); box-shadow: 0 0 0 2px var(--color-bubblegum); }
.tl-entry--current .tl-dot { box-shadow: 0 0 0 4px rgba(229,75,60,.2); }

.tl-role {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: var(--text-xl);
  letter-spacing: -.02em;
  line-height: 1.1;
}

/* Everything below the title row is indented to align with the text column */
.tl-sub { padding-left: calc(20px + 1.75rem); }

.tl-org  { font-size: var(--text-sm); font-weight: 600; color: var(--color-cherry); margin-bottom: .75rem; margin-top: .2rem; }
.tl-desc { font-size: var(--text-sm); line-height: 1.7; color: #3a3530; max-width: 60ch; }
.tl-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; }
.tl-tag  { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .06em; padding: 2px 8px; border: 1px solid rgba(26,22,18,.2); border-radius: 100px; color: #6b6460; text-transform: uppercase; }

.tl-section-head { font-family: var(--font-mono); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--color-cherry); margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--color-ink); margin-top: 3.5rem; }
.tl-section-head:first-child { margin-top: 0; }
</style>
</head>

        </div>
      </main>
      <Footer />

}
