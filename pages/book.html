const data = {

    title: 'Braiding <span class="serif-italic">Sweetgrass</span>',
    plainTitle: 'Braiding Sweetgrass',
    author: 'Robin Wall Kimmerer',
    tag: 'Science · Philosophy',
    coverBg: '#6B7A3F',
    coverText: '#FCF7E5',
    connects: ['AI Ethics', 'Slow Design', 'Systems Thinking'],
    next: { slug: 'the-ministry-for-the-future', title: 'The Ministry for the <span class="serif-italic">Future</span>' },
    body: `
      <h2>Why I am reading this</h2>
      <p>Robin Wall Kimmerer is a botanist and a member of the Citizen Potawatomi Nation. This book is about plants — but it is really about what happens when you take indigenous knowledge as seriously as scientific knowledge, and what that shift reveals about how we understand the world.</p>
      <p>I came to it because I kept hitting a wall in my AI ethics work: Western analytical frameworks are useful for identifying harms, but they are not very good at articulating what a genuinely reciprocal relationship between technology and people might look like. Kimmerer has a lot to say about reciprocity.</p>
      <blockquote>"In the Western tradition there is a pattern of thought called the Doctrine of Discovery — the idea that whoever arrives first has the right to claim the land. What if we inverted that, and asked instead: what are our obligations to the land that receives us?"</blockquote>
      <h2>What I am taking from it</h2>
      <p>The idea that gratitude is not sentiment but practice — and that the language we use to describe the world shapes what we are able to see in it. Kimmerer argues that the English language, by treating plants and the non-human world as objects (it, them) rather than subjects (she, they, kin), actively prevents us from certain kinds of understanding.</p>
      <p>That applies directly to AI: the language of "tools", "systems", and "outputs" shapes what questions we think to ask. What if we asked different questions?</p>
    `,
  },
  'the-ministry-for-the-future': {
    num: '02',
    title: 'The Ministry for the <span class="serif-italic">Future</span>',
    plainTitle: 'The Ministry for the Future',
    author: 'Kim Stanley Robinson',
    tag: 'Climate Fiction',
    coverBg: '#B9A6E0',
    coverText: '#1A1612',
    connects: ['AI Policy', 'Governance', 'Futures Thinking'],
    next: { slug: 'invisible-cities', title: '<span class="serif-italic">Invisible</span> Cities' },
    body: `
      <h2>Why I am reading this</h2>
      <p>Kim Stanley Robinson wrote a novel about climate governance — the unglamorous, procedural, institutional work of trying to change the world. It opens with a devastating heatwave scene and then spends four hundred pages inside the machinery of international policy. It is, somehow, gripping.</p>
      <p>I read it alongside my AI governance work because it asks the same questions: what does it take to actually govern a global technology (or a global crisis) when national interests, corporate power, and democratic legitimacy all pull in different directions? Robinson is not optimistic, but he is not nihilistic either.</p>
      <blockquote>"It's not that people are ignorant of what needs to be done. It's that the institutions don't exist to do it — so you have to build them while also trying to use them."</blockquote>
      <h2>What I am taking from it</h2>
      <p>The Ministry itself — a fictional UN agency — is interesting as a governance design artefact. It has no enforcement power. It operates by influence, persuasion, and the slow accumulation of legitimacy. That is basically how AI governance works too, right now. The book makes that feel less like failure and more like the nature of the problem.</p>
    `,
  },
  'invisible-cities': {
    num: '03',
    title: '<span class="serif-italic">Invisible</span> Cities',
    plainTitle: 'Invisible Cities',
    author: 'Italo Calvino',
    tag: 'Literary Fiction',
    coverBg: '#E8432D',
    coverText: '#FCF7E5',
    connects: ['Design Thinking', 'Place', 'Narrative'],
    next: { slug: 'atlas-of-ai', title: 'Atlas of <span class="serif-italic">AI</span>' },
    body: `
      <h2>Why I am reading this</h2>
      <p>Calvino's Marco Polo describes fifty-five cities to Kublai Khan. None of them are real. Each one is a thought experiment about how a city can be organised, what a city can mean, what humans build and why. I read it slowly, one or two cities at a time.</p>
      <p>It feels like a design portfolio from an alternate universe — each city a prototype for a different way of solving the same problem: how do people live together in space?</p>
      <blockquote>"Cities, like dreams, are made of desires and fears, even if the thread of their discourse is secret, their rules are absurd, their perspectives deceitful, and everything conceals something else."</blockquote>
      <h2>What I am taking from it</h2>
      <p>That description is a perfect description of complex systems. And of AI models. And of most institutions. Reading Calvino has made me a better systems thinker by forcing me to hold contradiction — a city can be about memory and also about forgetting; a system can be about efficiency and also about power — without resolving it.</p>
      <p>It is also just very beautiful. Not everything has to be instrumentalised.</p>
    `,
  },
  'atlas-of-ai': {
    num: '04',
    title: 'Atlas of <span class="serif-italic">AI</span>',
    plainTitle: 'Atlas of AI',
    author: 'Kate Crawford',
    tag: 'Technology · Ethics',
    coverBg: '#1A1612',
    coverText: '#FCF7E5',
    connects: ['AI Ethics', 'AI Policy', 'Data'],
    next: { slug: 'the-art-of-living', title: 'The Art of <span class="serif-italic">Living</span>' },
    body: `
      <h2>Why I am reading this</h2>
      <p>Kate Crawford's Atlas of AI is required reading for anyone working in AI governance. It maps the physical, political, and social infrastructure that makes AI systems possible — the mines that produce the lithium for the hardware, the warehouses where human labellers sit annotating training data, the military contracts that fund research, the legal frameworks that protect corporate interests.</p>
      <p>I return to it regularly because it is the best antidote to abstraction I know. When someone talks about "the cloud", Crawford shows you the data centre in the desert and the power infrastructure that feeds it.</p>
      <blockquote>"AI is neither artificial nor intelligent. It is made from natural resources, and it is a system of human labour. It is neither as smart as its proponents claim, nor as dangerous as its detractors fear — but it is deeply political."</blockquote>
      <h2>What I am taking from it</h2>
      <p>The concept of the "atlas" is methodological as much as it is a title. Crawford argues that AI cannot be understood through any single lens — technical, economic, political, environmental, social — and that governance work has to be equally multi-perspectival. My own practice has moved in this direction: away from single-framework audits towards more situated, contextual analysis.</p>
    `,
  },
  'the-art-of-living': {
    num: '05',
    title: 'The Art of <span class="serif-italic">Living</span>',
    plainTitle: 'The Art of Living',
    author: 'Thich Nhat Hanh',
    tag: 'Philosophy',
    coverBg: '#EE7BA8',
    coverText: '#1A1612',
    connects: ['Slow Design', 'Wellbeing', 'Practice'],
    next: { slug: 'braiding-sweetgrass', title: 'Braiding <span class="serif-italic">Sweetgrass</span>' },
    body: `
      <h2>Why I am reading this</h2>
      <p>I picked this up in a difficult week and have not put it down. Thich Nhat Hanh writes about practice — daily, embodied, unglamorous practice — as the only real way to change anything, including yourself. The clarity of the writing is almost disorienting: sentences that feel obvious until you sit with them and realise they are not obvious at all.</p>
      <p>I read it partly as a counterweight to the urgency that runs through everything else I read. Not everything is a problem to be optimised.</p>
      <blockquote>"The present moment is the only moment available to us, and it is the door to all moments."</blockquote>
      <h2>What I am taking from it</h2>
      <p>The idea of interbeing — that nothing exists independently of everything else — maps surprisingly well onto systems thinking and onto the critique of AI reductionism. Harms do not exist in isolation; they are relational. Solutions have to be relational too.</p>
      <p>More personally: the reminder that how you do the work matters as much as what you produce. Presence is a design skill.</p>
    `,
  },
};

</script>
