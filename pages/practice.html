const data = {

    tag: 'Design Practice',
    title: 'Human-Centred <span class="serif-italic">Design</span>',
    lede: 'Interfaces and services built around the lived reality of users — from clinical triage tools to education platforms. I work through research, prototyping, and iteration.',
    tools: 'Figma · Maze · User interviews · Prototyping',
    bg: '#E8432D',
    text: '#FCF7E5',
    disciplines: ['UX Research', 'Service Design', 'Interaction Design', 'Prototyping', 'Usability Testing'],
    related: [
      { title: 'Atlas of Care', slug: 'atlas-of-care', meta: 'Case study · 2024' },
      { title: 'Slow Learning', slug: 'slow-learning', meta: 'EdTech · UX' },

    next: { slug: 'data', title: 'Data <span class="serif-italic">Storytelling</span>' },
    body: `
      <h2>How I approach design</h2>
      <p>Good design begins before any screen is open. I start with deep contextual inquiry — observing how people actually work, not how they say they work. The gap between those two things is usually where the problem lives.</p>
      <p>I treat every project as a service design problem, not just a UI problem. That means mapping the full user journey, identifying systemic failure points, and working back from the moment of need rather than forward from a feature list.</p>
      <blockquote>"Design is not just what it looks like and feels like. Design is how it works." — Steve Jobs</blockquote>
      <h2>Research methods I use</h2>
      <ul>
        <li>Contextual inquiry and shadowing in real-world environments</li>
        <li>Semi-structured interviews with users, stakeholders, and subject matter experts</li>
        <li>Co-design workshops to surface latent needs</li>
        <li>Heuristic audits of existing interfaces and processes</li>
        <li>Usability testing with think-aloud protocols</li>
      </ul>
      <h2>Design principles I hold</h2>
      <p>Clarity over cleverness. Every decision should reduce cognitive load for the person using it, not add to it. I am especially attuned to designs for high-stress contexts — clinical environments, crisis services, governance tools — where failure is costly and trust is earned slowly.</p>
      <p>I also believe accessibility is not a bolt-on. Colour contrast, touch target size, reading level, and screen reader compatibility are design constraints I work within from the first wireframe, not at the final QA stage.</p>
      <h2>Tools and stack</h2>
      <p>I prototype in Figma — from rough flow diagrams to pixel-perfect components with detailed handoff specs. For usability testing I use Maze for moderated and unmoderated studies, and conduct contextual interviews in person wherever the project allows. I write enough front-end code (HTML, CSS, React) to build proof-of-concept prototypes when static mockups won't capture the interaction.</p>
    `,
  },
  data: {
    tag: 'Data Practice',
    title: 'Data <span class="serif-italic">Storytelling</span>',
    lede: 'Datasets turned into decisions. I find the signal in complex data and make it legible — to executives, policymakers, and the general public.',

    bg: '#EE7BA8',
    text: '#1A1612',
    disciplines: ['Data Visualisation', 'Statistical Analysis', 'Dashboard Design', 'Narrative Framing', 'Python'],
    related: [

      { title: 'Zero to Twelve', slug: 'zero-to-twelve', meta: 'Strategy · Analytics' },
    ],
    next: { slug: 'ai', title: 'AI Ethics <span class="serif-italic">&amp; Policy</span>' },
    body: `
      <h2>Data as a design material</h2>
      <p>Data is not neutral. Every dataset carries the assumptions of the people who collected it — what was counted, what was excluded, how categories were defined. My first step with any data project is to interrogate the data's provenance before I draw any conclusions from it.</p>
      <p>When I analyse a dataset, I am asking: what story does this want to tell, and what story does it actually support? The gap between those two things is often the most interesting finding.</p>
      <blockquote>"The greatest value of a picture is when it forces us to notice what we never expected to see." — John Tukey</blockquote>
      <h2>From analysis to artefact</h2>
      <p>I move fluently between exploratory analysis (Python, pandas, matplotlib) and publication-ready visualisation (D3.js, Observable, Tableau). The tool is always secondary to the question being asked. An interactive chart is not always better than a well-chosen table.</p>
      <ul>
        <li>Exploratory data analysis to surface patterns, outliers, and tensions</li>
        <li>Narrative framing — deciding what story is worth telling and to whom</li>
        <li>Visual encoding decisions based on the cognitive task being supported</li>
        <li>Interactive design for audiences who need to interrogate the data themselves</li>
      </ul>
      <h2>Who I make data legible for</h2>
      <p>I have presented data-driven findings to clinical directors, education ministers, NGO boards, and the general public. Each audience requires a completely different framing. A statistical finding that excites a researcher might terrify a policymaker — or mean nothing to them. I translate between those registers.</p>
    `,
  },
  ai: {
    tag: 'AI Practice',
    title: 'AI Ethics <span class="serif-italic">&amp; Policy</span>',
    lede: 'Practical governance at the intersection of AI systems, human rights, and institutional accountability — from classroom audits to national-level submissions.',
    tools: 'Policy analysis · Framework design · Stakeholder consultation',
    bg: '#B9A6E0',
    text: '#1A1612',
    disciplines: ['AI Governance', 'Policy Writing', 'Ethics Frameworks', 'Stakeholder Analysis', 'Risk Assessment'],
    related: [
      { title: 'The Audit Manual', slug: 'audit-manual', meta: 'Research · Policy' },
      { title: 'Borders of the Model', slug: 'borders-of-the-model', meta: 'AI Policy · 2025' },
    ],
    next: { slug: 'growth', title: 'Start-up <span class="serif-italic">Strategy</span>' },
    body: `
      <h2>The governance gap</h2>
      <p>AI systems are being deployed faster than the institutions designed to oversee them can adapt. Most governance frameworks address technical risk in isolation — they miss the social, cultural, and political contexts that determine whether a technology causes harm. I work at that intersection.</p>
      <p>My approach is grounded in specific contexts. I do not write generic ethics guidelines. I work with the particular institution, the particular tool, and the particular population affected — and ask: what does accountability look like here, in practice, not in principle?</p>
      <blockquote>"The question is not whether AI will change education. The question is who gets to decide how." — from The Audit Manual</blockquote>
      <h2>What governance work looks like</h2>
      <ul>
        <li>Auditing AI tools against established frameworks (OECD, UNESCO, UK AI Safety Institute)</li>
        <li>Co-designing procurement criteria with institutions buying AI systems</li>
        <li>Writing policy submissions with specific legislative recommendations</li>
        <li>Training educators and administrators to evaluate AI claims critically</li>
        <li>Cross-border analysis of regulatory approaches and their gaps</li>
      </ul>
      <h2>Where I focus</h2>
      <p>My work concentrates on two areas: AI in education (where children and young people interact with systems they cannot meaningfully consent to or scrutinise), and cross-border AI governance (where national regulations fail to address systems that operate across jurisdictions). These are not abstract problems — they have immediate, material consequences for real people.</p>
    `,
  },
  growth: {
    tag: 'Growth Practice',
    title: 'Start-up <span class="serif-italic">Strategy</span>',
    lede: 'Zero-to-revenue growth across education and technology. I have worked with founders across three continents to find product-market fit and scale sustainably.',
    tools: 'OKRs · Growth loops · Positioning · Market research',
    bg: '#6B7A3F',
    text: '#FCF7E5',
    disciplines: ['Growth Strategy', 'Product-Market Fit', 'OKR Frameworks', 'Positioning', 'Market Entry'],
    related: [
      { title: 'Zero to Twelve', slug: 'zero-to-twelve', meta: 'Strategy · 2023–24' },
      { title: 'Reading the Diaspora', slug: 'reading-the-diaspora', meta: 'Market analysis' },
    ],
    next: { slug: 'design', title: 'Human-Centred <span class="serif-italic">Design</span>' },
    body: `
      <h2>What growth actually means</h2>
      <p>Growth strategy is not a list of acquisition channels. It is a theory of why your product deserves to exist, who it is for, and what has to be true for those people to find it and stay. Most early-stage companies fail because they answer the first question badly — they build something technically functional that solves a problem nobody has enough of to pay for.</p>
      <p>I help founders find the problem worth solving — and then build the scaffolding to reach the people who have it.</p>
      <blockquote>"Do things that don't scale, then figure out why they worked." — Paul Graham (paraphrased)</blockquote>
      <h2>How I work with founders</h2>
      <ul>
        <li>Customer discovery interviews to test problem-solution fit before building</li>
        <li>OKR frameworks that connect company strategy to team-level priorities</li>
        <li>Positioning work — articulating value in the language of customers, not engineers</li>
        <li>Market entry sequencing for international expansion</li>
        <li>Growth loop design — identifying the sustainable engine behind initial traction</li>
      </ul>
      <h2>EdTech focus</h2>
      <p>Most of my growth work has been in education technology — a sector with notoriously long sales cycles, institutional buyers, and complex multi-stakeholder dynamics (teacher, student, parent, administrator, funder often all have different interests). I understand the procurement landscape, the funding cycles, and the trust-building required to sell into schools and universities across different country contexts.</p>
    `,
  },
