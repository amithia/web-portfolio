<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Learning · Amithi Liyanagamage</title>
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
.al-provider-section { margin-bottom: 3rem; }
.al-provider-section + .al-provider-section { border-top: 1px solid rgba(26,22,18,.08); padding-top: 3rem; }

.al-provider-head {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 1.25rem;
}
.al-provider-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.al-provider-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -.01em;
}
.al-provider-count {
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .06em;
  color: #6b6460;
  margin-left: auto;
}

.al-course-list { display: flex; flex-direction: column; gap: .5rem; }
.al-course-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: start;
  padding: 1rem 1.25rem;
  background: white;
  border-radius: 10px;
  border: 1px solid rgba(26,22,18,.08);
  transition: border-color .15s ease;
}
.al-course-row:hover { border-color: rgba(26,22,18,.2); }
.al-course-row__name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: .9rem;
  letter-spacing: -.01em;
  margin-bottom: .3rem;
  line-height: 1.3;
}
.al-course-row__desc {
  font-size: .82rem;
  color: #6b6460;
  line-height: 1.55;
}
.al-course-row__right { display: flex; flex-direction: column; align-items: flex-end; gap: .5rem; padding-top: .1rem; }
.al-status-chip {
  font-family: var(--font-mono);
  font-size: .58rem;
  letter-spacing: .08em;
  padding: .28rem .7rem;
  border-radius: 100px;
  white-space: nowrap;
}
.al-status-chip--active  { background: var(--color-cherry); color: white; }
.al-status-chip--planned { background: rgba(26,22,18,.08); color: #6b6460; }
.al-course-progress {
  width: 80px; height: 3px;
  border-radius: 100px;
  background: rgba(26,22,18,.1);
  overflow: hidden;
}
.al-course-progress__bar {
  height: 100%;
  background: var(--color-cherry);
  border-radius: 100px;
}

.al-courses-layout {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 3rem;
  margin-top: 3rem;
  align-items: start;
}
@media (max-width: 860px) { .al-courses-layout { grid-template-columns: 1fr; } }

.al-courses-sidebar {
  position: sticky;
  top: 5rem;
}
.al-courses-sidebar__stat {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: var(--text-4xl);
  line-height: 1;
  letter-spacing: -.04em;
}
.al-courses-sidebar__label {
  font-size: .85rem;
  color: #6b6460;
  margin-bottom: 1.5rem;
}
.al-courses-sidebar__p { font-size: .9rem; line-height: 1.7; color: #3a3530; margin-bottom: 1rem; }
</style>
</head>
<body>
<div id="root"></div>

<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
const PROVIDER_DOTS = {
  'Google':           '#E54B3C',
  'Anthropic':        '#E54B3C',
  'Microsoft':        '#B9A6E0',
  'Amazon':           '#6B7A3F',
  'LinkedIn Learning':'#EE7BA8',
  'Databricks':       '#1A1612',
  'Snowflake':        '#B9A6E0',
  'Docker':           '#EE7BA8',
};

function CourseRow({ course }) {
  const isActive = course.status === 'in-progress';
  return (
    <div className="al-course-row">
      <div>
        <div className="al-course-row__name">{course.title}</div>
        <div className="al-course-row__desc">{course.description}</div>
      </div>
      <div className="al-course-row__right">
        <span className={`al-status-chip al-status-chip--${isActive ? 'active' : 'planned'}`}>
          {isActive ? 'IN PROGRESS' : 'PLANNED'}
        </span>
        {isActive && course.progress > 0 && (
          <div className="al-course-progress">
            <div className="al-course-progress__bar" style={{ width: `${course.progress}%` }} />
          </div>
        )}
      </div>
    </div>
  );
}

function CoursesPage() {
  const allCourses  = window.COURSES;
  const inProgress  = allCourses.filter(c => c.status === 'in-progress');
  const planned     = allCourses.filter(c => c.status === 'planned');

  const providers = [...new Set(planned.map(c => c.provider))];

  return (
    <>
      <Nav />
      <main className="al-container" data-screen-label="Learning">
        <Breadcrumb trail={[
          { label: 'Index', href: '/' },
          { label: 'Learning' },
        ]} />

        <div className="al-courses-layout">
          <div className="al-courses-sidebar">
            <div className="al-courses-sidebar__stat">{allCourses.length}</div>
            <div className="al-courses-sidebar__label">courses tracked</div>
            <p className="al-courses-sidebar__p">
              A living list of certifications and courses — some in progress, most planned.
              Updated as I work through them.
            </p>
            <p className="al-courses-sidebar__p">
              The focus areas: AI integration, data analytics, cloud infrastructure, and full-stack web.
              Each one connects to something I'm building or want to build.
            </p>
            {inProgress.length > 0 && (
              <div style={{ marginTop: '2rem', paddingTop: '1.5rem', borderTop: '1px solid rgba(26,22,18,.1)' }}>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.65rem', letterSpacing: '.08em', color: 'var(--color-cherry)', marginBottom: '.5rem' }}>NOW</div>
                {inProgress.map(c => (
                  <div key={c.id} style={{ marginBottom: '.75rem' }}>
                    <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: '.85rem' }}>{c.title}</div>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: '.65rem', color: '#6b6460', marginTop: '.2rem' }}>
                      {c.provider} · {c.progress}%
                    </div>
                    <div className="al-course-progress" style={{ width: '100%', marginTop: '.4rem' }}>
                      <div className="al-course-progress__bar" style={{ width: `${c.progress}%` }} />
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div>
            {providers.map(provider => {
              const courses = planned.filter(c => c.provider === provider);
              return (
                <div key={provider} className="al-provider-section">
                  <div className="al-provider-head">
                    <div className="al-provider-dot" style={{ background: PROVIDER_DOTS[provider] || '#1A1612' }} />
                    <div className="al-provider-name">{provider}</div>
                    <div className="al-provider-count">{courses.length} course{courses.length !== 1 ? 's' : ''}</div>
                  </div>
                  <div className="al-course-list">
                    {courses.map(c => <CourseRow key={c.id} course={c} />)}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CoursesPage />);
</script>
</body>
</html>
