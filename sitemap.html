<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sitemap · Amithi Liyanagamage</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<!-- SEO & Social — update domain once deployed -->
<meta name="description" content="Sitemap for Amithi Liyanagamage's portfolio." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://amithi.work/sitemap" />
<meta property="og:title" content="Sitemap · Amithi Liyanagamage" />
<meta property="og:description" content="Sitemap for Amithi Liyanagamage's portfolio." />
<meta property="og:image" content="https://amithi.work/assets/photos/about-profile.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Sitemap · Amithi Liyanagamage" />
<meta name="twitter:description" content="Sitemap for Amithi Liyanagamage's portfolio." />
<meta name="twitter:image" content="https://amithi.work/assets/photos/about-profile.jpg" />
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
/* ── Sitemap grid ── */
.sm-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}
@media (max-width: 900px) { .sm-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .sm-grid { grid-template-columns: 1fr; } }

/* ── Section card ── */
.sm-card {
  border: 2px solid var(--color-ink);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: var(--color-chalk);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
}

.sm-card__header {
  padding: .9rem 1.25rem;
  background: var(--color-ink);
  color: var(--color-chalk);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
}
.sm-card__header--cherry  { background: var(--color-cherry); color: var(--color-ink); }
.sm-card__header--lilac   { background: var(--color-lilac);  color: var(--color-ink); }
.sm-card__header--moss    { background: var(--color-moss);   color: var(--color-chalk); }
.sm-card__header--bubble  { background: var(--color-bubblegum); color: var(--color-ink); }

.sm-card__label {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  opacity: .7;
}
.sm-card__title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: var(--text-lg);
  letter-spacing: -.02em;
  line-height: 1.1;
}
.sm-card__count {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  opacity: .6;
  flex-shrink: 0;
}

/* ── Link list ── */
.sm-card__body {
  padding: .25rem 0;
  flex: 1;
}
.sm-link {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .65rem 1.25rem;
  border-bottom: 1px solid rgba(26,22,18,.07);
  text-decoration: none;
  color: var(--color-ink);
  transition: background .15s, padding-left .15s;
  position: relative;
}
.sm-link:last-child { border-bottom: none; }
.sm-link:hover {
  background: var(--color-parchment);
  padding-left: 1.6rem;
}
.sm-link__num {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .06em;
  color: #aaa;
  width: 1.4rem;
  flex-shrink: 0;
  text-align: right;
}
.sm-link__name {
  font-size: var(--text-sm);
  font-weight: 500;
  flex: 1;
  line-height: 1.3;
}
.sm-link__tag {
  font-family: var(--font-mono);
  font-size: .58rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: #999;
  flex-shrink: 0;
}
.sm-link__arrow {
  font-size: .65rem;
  color: var(--color-cherry);
  opacity: 0;
  transition: opacity .15s, transform .15s;
  flex-shrink: 0;
}
.sm-link:hover .sm-link__arrow { opacity: 1; transform: translateX(2px); }

/* ── Hero banner ── */
.sm-hero {
  border: 2px solid var(--color-ink);
  border-radius: var(--radius-md);
  background: var(--color-ink);
  color: var(--color-chalk);
  padding: 2.5rem 2rem;
  margin-bottom: 2.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
  box-shadow: 8px 8px 0 var(--color-cherry);
  position: relative;
  overflow: hidden;
}
.sm-hero::before {
  content: '✦';
  position: absolute;
  right: -1rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(6rem, 15vw, 10rem);
  color: rgba(252,247,229,.04);
  pointer-events: none;
  line-height: 1;
}
.sm-hero__eyebrow {
  font-family: var(--font-mono);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--color-bubblegum);
  margin-bottom: .75rem;
}
.sm-hero__title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 3.5rem);
  letter-spacing: -.03em;
  line-height: 1;
  margin-bottom: .75rem;
}
.sm-hero__sub {
  color: rgba(252,247,229,.6);
  font-size: var(--text-sm);
  line-height: 1.6;
  max-width: 360px;
}
.sm-hero__stat {
  text-align: right;
  flex-shrink: 0;
}
.sm-hero__stat-num {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: -.04em;
  line-height: 1;
  color: var(--color-cherry);
}
.sm-hero__stat-label {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(252,247,229,.45);
  margin-top: .25rem;
}
@media (max-width: 560px) {
  .sm-hero { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
  .sm-hero__stat { text-align: left; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
function stripHtml(str) {
  return str ? str.replace(/<[^>]*>/g, '') : '';
}

function SmCard({ label, title, count, tone, children }) {
  return (
    <div className="sm-card">
      <div className={`sm-card__header${tone ? ` sm-card__header--${tone}` : ''}`}>
        <div>
          <div className="sm-card__label">{label}</div>
          <div className="sm-card__title">{title}</div>
        </div>
        {count != null && <span className="sm-card__count">{count}</span>}
      </div>
      <div className="sm-card__body">{children}</div>
    </div>
  );
}

function SmLink({ href, name, tag, num }) {
  return (
    <a href={href} className="sm-link">
      {num != null && <span className="sm-link__num">{String(num).padStart(2, '0')}</span>}
      <span className="sm-link__name">{name}</span>
      {tag && <span className="sm-link__tag">{tag}</span>}
      <span className="sm-link__arrow">→</span>
    </a>
  );
}

function SitemapPage() {
  const projects = window.PROJECTS  || [];
  const upcoming = window.UPCOMING  || [];
  const learning = window.LEARNING  || [];
  const creative = window.CREATIVE  || [];
  const total    = 6 + projects.length + upcoming.length + learning.length + creative.length;

  return (
    <>
      <Nav />
      <main>
        <div className="al-container" style={{ paddingTop: 'clamp(2rem,5vw,4rem)', paddingBottom: 'clamp(3rem,7vw,6rem)' }}>

          <Breadcrumb trail={[{ label: 'Home', href: '/home' }, { label: 'Sitemap' }]} />

          {/* Hero */}
          <div className="sm-hero">
            <div>
              <p className="sm-hero__eyebrow">Everything, in one place</p>
              <h1 className="sm-hero__title">
                Site<em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400 }}> map</em>
              </h1>
              <p className="sm-hero__sub">Every page, project, course and creative work on this site — indexed and linked.</p>
            </div>
            <div className="sm-hero__stat">
              <div className="sm-hero__stat-num">{total}</div>
              <div className="sm-hero__stat-label">Total pages</div>
            </div>
          </div>

          <div className="sm-grid">

            {/* Main navigation */}
            <SmCard label="Navigation" title="Main pages" tone="cherry" count="6 pages">
              <SmLink href="/"            name="Home"        num={1} tag="Index" />
              <SmLink href="/about"       name="About"       num={2} />
              <SmLink href="/work"        name="Work"        num={3} />
              <SmLink href="/beyond-work" name="Beyond Work" num={4} />
              <SmLink href="/milestones"  name="Milestones"  num={5} />
              <SmLink href="/contact"     name="Contact"     num={6} />
            </SmCard>

            {/* Shipped work */}
            <SmCard label="Shipped work" title="Projects" count={`${projects.length} projects`}>
              {projects.map((p, i) => (
                <SmLink
                  key={p.slug}
                  href={`/work/${p.slug}`}
                  name={stripHtml(p.title)}
                  num={i + 1}
                  tag={p.year ? String(p.year) : p.meta}
                />
              ))}
            </SmCard>

            {/* Pipeline */}
            <SmCard label="In the works" title="Pipeline" tone="lilac" count={`${upcoming.length} projects`}>
              {upcoming.map((p, i) => (
                <SmLink
                  key={p.slug}
                  href={`/work/${p.slug}`}
                  name={stripHtml(p.title)}
                  num={i + 1}
                  tag="Soon"
                />
              ))}
            </SmCard>

            {/* Learning */}
            <SmCard label="Independent learning" title="Certifications" tone="moss" count={`${learning.length} certs`}>
              {learning.map((l, i) => (
                <SmLink
                  key={l.slug}
                  href={`/beyond-work/${l.slug}`}
                  name={l.title}
                  num={i + 1}
                  tag={l.provider}
                />
              ))}
            </SmCard>

            {/* Creative */}
            <SmCard label="Art &amp; expression" title="Creative work" tone="bubble" count={`${creative.length} works`}>
              {creative.map((c, i) => (
                <SmLink
                  key={c.slug}
                  href={`/beyond-work/${c.slug}`}
                  name={c.title}
                  num={i + 1}
                  tag={c.meta || null}
                />
              ))}
            </SmCard>

            {/* Focuses */}
            <SmCard label="Disciplines" title="Focuses" count="4 areas">
              {(window.PRACTICES || []).map((p, i) => (
                <SmLink
                  key={p.slug}
                  href={`/practice?id=${p.slug}`}
                  name={p.title}
                  num={i + 1}
                  tag={p.tag}
                />
              ))}
            </SmCard>

          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SitemapPage />);
</script>
</body>
</html>
