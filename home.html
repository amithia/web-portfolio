<script type="text/babel" src="components/Project.jsx"></script>
<script type="text/babel" src="components/Extras.jsx"></script>
<script type="text/babel" src="components/AboutFooter.jsx"></script>

<script type="text/babel">
const { useState } = React;

const FILTERS = [
  { id: 'all',     label: 'All',               dot: '#E54B3C' },
  { id: 'fullstack', label: 'Full-Stack Dev',   dot: '#E54B3C' },
  { id: 'ux',      label: 'UI/UX',             dot: '#E54B3C' },
  { id: 'mobile',  label: 'Mobile Apps',      dot: '#EE7BA8' },
  { id: 'data',    label: 'Data & Analytics',  dot: '#6B7A3F' },
  { id: 'ai',      label: 'AI',                dot: '#B9A6E0' },
  { id: 'consulting', label: 'Consulting',      dot: '#e4d837' }
];

function App() {
  const [filter, setFilter] = useState('all');
  const visible = window.PROJECTS.filter(p => p.slug !== 'ab-testing-calculator' && (filter === 'all' || p.category === filter));

  React.useEffect(() => {
    const hash = window.location.hash;
    if (!hash) return;
    const el = document.querySelector(hash);
    if (el) { el.scrollIntoView({ behavior: 'smooth' }); return; }
    // Section not yet painted — wait for next frame
    requestAnimationFrame(() => {
      const el2 = document.querySelector(hash);
      if (el2) el2.scrollIntoView({ behavior: 'smooth' });
    });
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <About />
      <section className="al-section" id="work" data-screen-label="Work" style={{ paddingBottom: 'clamp(2rem,4vw,3rem)' }}>
        <div className="al-container">
          <SectionHeader title='Selected <em>work</em>' index="02 / Work" />
          <FilterBar filters={FILTERS} active={filter} onChange={setFilter} />
          <div className="al-grid-3">
            {visible.map(p => <ProjectCard key={p.id} project={p} featured={p.featured} />)}
          </div>
          <div style={{ textAlign: 'center', marginTop: '4rem' }}>
            <Btn href="/work" variant="primary">See all work &amp; upcoming projects</Btn>
          </div>
        </div>
      </section>
      <Services />
      <Reading />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
