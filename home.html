<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amithi Liyanagamage</title>
<meta name="description" content="Portfolio of Amithi Liyanagamage — Full-Stack, UI/UX, Data & Analytics, & AI." />
<link rel="stylesheet" href="styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Bits.jsx"></script>
<script type="text/babel" src="components/Project.jsx"></script>
<script type="text/babel" src="components/Extras.jsx"></script>
<script type="text/babel" src="components/AboutFooter.jsx"></script>

<script type="text/babel">
const { useState } = React;

const FILTERS = [
  { id: 'all',     label: 'All',               dot: '#E54B3C' },
  { id: 'fullstack', label: 'Full-Stack Dev',   dot: '#E54B3C' },
  { id: 'ux',      label: 'UI/UX',             dot: '#E54B3C' },
  { id: 'mobile',  label: 'Mobile Apps',      dot: '#EE7BA8' },
  { id: 'data',    label: 'Data & Analytics',  dot: '#6B7A3F' },
  { id: 'ai',      label: 'AI',                dot: '#B9A6E0' },
  { id: 'consulting', label: 'Consulting',      dot: '#e4d837' }
];

function App() {
  const [filter, setFilter] = useState('all');
  const visible = window.PROJECTS.filter(p => p.slug !== 'ab-testing-calculator' && (filter === 'all' || p.category === filter));
  return (
    <>
      <Nav />
      <Hero />
      <div className="al-container">
        <div className="al-widgets">
          <NowReading />
          <Stamp />
        </div>
        <Stats items={[
          { num: '5+', label: 'Years in the industry' },
          { num: '6',  label: 'Projects shipped' },
          { num: '10+',  label: 'Countries visited' },
          { num: '4000+',  label: 'Cups of coffee consumed' },
        ]} />
      </div>
      <About />
      <section className="al-section" id="work" data-screen-label="Work">
        <div className="al-container">
          <SectionHeader title='Selected <em>work</em>' index="01 / Work" />
          <FilterBar filters={FILTERS} active={filter} onChange={setFilter} />
          <div className="al-grid-3">
            {visible.map(p => <ProjectCard key={p.id} project={p} featured={p.featured} />)}
          </div>
          <div style={{ textAlign: 'center', marginTop: '2.5rem' }}>
            <Btn href="/work" variant="primary">See all work &amp; upcoming projects</Btn>
          </div>
        </div>
      </section>
      <div className="al-container">
        <Poll />
      </div>
      <Services />
      <Reading />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
