<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">

  <!-- Fridge body (chalk fill) -->
  <rect x="8" y="3" width="24" height="35" rx="4" fill="#FCF7E5"/>

  <!-- Freezer section (moss green, rounded top matching body) -->
  <path d="M12 3 L28 3 Q32 3 32 7 L32 16 L8 16 L8 7 Q8 3 12 3 Z" fill="#6B7A3F"/>

  <!-- Body outline (drawn on top so border sits clean over fills) -->
  <rect x="8" y="3" width="24" height="35" rx="4" stroke="#1A1612" stroke-width="2"/>

  <!-- Divider between freezer and fridge -->
  <line x1="8" y1="16" x2="32" y2="16" stroke="#1A1612" stroke-width="2"/>

  <!-- Freezer handle (chalk) -->
  <rect x="15.5" y="8.5" width="9" height="2.5" rx="1.25" fill="#FCF7E5" stroke="#1A1612" stroke-width="1.2"/>

  <!-- Fridge handle (ink) -->
  <rect x="15.5" y="21.5" width="9" height="2.5" rx="1.25" fill="#1A1612"/>

  <!-- Apple (cherry red) -->
  <circle cx="15.5" cy="30" r="3.5" fill="#E54B3C" stroke="#1A1612" stroke-width="1.5"/>
  <!-- Apple stem -->
  <path d="M15.5 26.5 Q16.5 25.2 17.5 24.8" stroke="#6B7A3F" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Apple leaf -->
  <path d="M17.5 24.8 Q19.5 23.5 19 25.8 Q17.5 25.5 17.5 24.8 Z" fill="#6B7A3F" stroke="#1A1612" stroke-width="0.8"/>

  <!-- Herb / plant (right side) -->
  <line x1="25" y1="35.5" x2="25" y2="27.5" stroke="#6B7A3F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M25 32.5 C23.5 30.5 20.5 31 20.5 33 C22.5 33 24.5 32.5 25 32.5 Z" fill="#6B7A3F" stroke="#1A1612" stroke-width="0.9"/>
  <!-- Right leaf -->
  <path d="M25 29 C26.5 27 29.5 27.5 29.5 29.5 C27.5 29.5 25.5 29 25 29 Z" fill="#6B7A3F" stroke="#1A1612" stroke-width="0.9"/>

</svg>
