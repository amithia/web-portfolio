<head>

<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

<link rel="stylesheet" href="/css/styles.css" />
<link rel="stylesheet" href="/css/detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
.al-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
@media (max-width: 900px) { .al-grid-3 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px)  { .al-grid-3 { grid-template-columns: 1fr; } }
.al-subsection { margin-top: 4rem; }
.al-subsection__head { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(26,22,18,.12); }
.al-subsection__label { font-family: var(--font-display); font-weight: 900; font-size: var(--text-2xl); letter-spacing: -.02em; line-height: 1; }
.al-subsection__count { font-family: var(--font-mono); font-size: .7rem; letter-spacing: .06em; color: #6b6460; }
.al-card--upcoming .al-card__img { position: relative; overflow: hidden; }
.al-card--upcoming .al-card__img::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, rgba(26,22,18,.06) 0, rgba(26,22,18,.06) 1px, transparent 1px, transparent 8px); }
.al-card__soon-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: var(--font-mono); font-size: .6rem; letter-spacing: .1em; padding: .3rem .8rem; background: rgba(26,22,18,.65); color: #FCF7E5; border-radius: 100px; white-space: nowrap; backdrop-filter: blur(2px); }
.al-card--upcoming { opacity: .82; transition: opacity .2s ease; }
.al-card--upcoming:hover { opacity: 1; }
/* ── Flip card ── */
.al-flip { perspective: 1000px; -webkit-perspective: 1000px; cursor: pointer; height: 300px; }
.al-flip__inner { position: relative; width: 100%; height: 100%; transition: transform 0.45s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
.al-flip--flipped .al-flip__inner { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
.al-flip__face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; border: 2px solid var(--color-ink); overflow: hidden; background: #FCF7E5; display: flex; flex-direction: column; }
.al-flip__back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); padding: 1.25rem; justify-content: space-between; }
.al-flip__hint { font-family: var(--font-mono); font-size: .55rem; letter-spacing: .1em; color: rgba(26,22,18,.4); text-align: right; padding: .5rem .75rem .6rem; border-top: 1px solid rgba(26,22,18,.1); }
.al-flip__mystery { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.al-flip__mystery-q { font-family: var(--font-display); font-weight: 900; font-size: 5rem; line-height: 1; opacity: .18; user-select: none; }
.al-flip__mystery-dots { position: absolute; inset: 0; pointer-events: none; }
@media (max-width: 768px) { .al-flip { height: 320px; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/Project.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TONE_COLORS = {
  cherry: '#E54B3C', sage: '#6B7A3F', lavender: '#B9A6E0',
  ink: '#1A1612', gold: '#e4d837', pink: '#EE7BA8',
};

const MYSTERY_ICONS = {
  star:   'M14 2 L17 11 L26 12 L19 18 L21 27 L14 22 L7 27 L9 18 L2 12 L11 11 Z',
  heart:  'M14 24 C 14 24, 4 18, 4 11 A 5 5 0 0 1 14 8 A 5 5 0 0 1 24 11 C 24 18, 14 24, 14 24 Z',
  flame:  'M14 3 C 17 8, 22 11, 22 17 C 22 22, 18 26, 14 26 C 10 26, 6 22, 6 17 C 6 13, 9 11, 11 11 C 11 14, 12 15, 13 15 C 13 11, 13 7, 14 3 Z',
  pin:    'M14 3 C 10 3, 7 6, 7 10 C 7 16, 14 25, 14 25 C 14 25, 21 16, 21 10 C 21 6, 18 3, 14 3 Z',
  flower: null,
  globe:  null,
};

const SCATTER_POSITIONS = [
  [15,18],[72,12],[88,55],[60,80],[8,75],[40,90],[92,82],[25,45],[78,35],[50,15],
  [35,65],[65,50],[10,38],[85,22],[55,70],
];

function MysteryPanel({ tone, glyph }) {
  const col = TONE_COLORS[tone] || TONE_COLORS.cherry;
  const path = MYSTERY_ICONS[glyph] || MYSTERY_ICONS.star;
  return (
    <div className="al-flip__mystery" style={{ background: col }}>
      <svg className="al-flip__mystery-dots" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
        {SCATTER_POSITIONS.map(([x, y], i) => (
          <path key={i} d={path} fill="rgba(255,255,255,0.08)"
            transform={`translate(${x - 14} ${y - 14}) scale(${0.45 + (i % 3) * 0.18})`} />
        ))}
      </svg>
      <span style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: '3.5rem', color: 'rgba(255,255,255,0.22)', position: 'relative', zIndex: 1, userSelect: 'none', letterSpacing: '-.04em' }}>?</span>
      <span className="al-card__soon-badge" style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, 28px)', zIndex: 1 }}>COMING SOON</span>
    </div>
  );
}

function UpcomingCard({ project }) {
  const { tone = 'cherry', cat, title, teaser, slug, glyph } = project;
  const [flipped, setFlipped] = React.useState(false);

  return (
    <div
      className={`al-flip${flipped ? ' al-flip--flipped' : ''}`}
      onClick={() => setFlipped(f => !f)}
      role="button"
      tabIndex={0}
      aria-pressed={flipped}
      aria-label={`${flipped ? 'Flip back: ' : 'Flip for more: '}${title.replace(/<[^>]+>/g, '')}`}
      onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && setFlipped(f => !f)}
    >
      <div className="al-flip__inner">
        <div className="al-flip__face">
          <MysteryPanel tone={tone} glyph={glyph} />
          <div className="al-card__body">
            <span className="al-card__cat">{cat}</span>
            <h3 className="al-card__title" dangerouslySetInnerHTML={{ __html: title }} />
          </div>
          <div className="al-flip__hint">tap for more →</div>
        </div>
        <div className="al-flip__face al-flip__back">
          <div>
            <span className="al-card__cat" style={{ marginBottom: '.75rem', display: 'block' }}>{cat}</span>
            <h3 className="al-card__title" style={{ marginBottom: '1rem' }} dangerouslySetInnerHTML={{ __html: title }} />
            <p style={{ fontSize: 'var(--text-sm)', color: '#3a3530', lineHeight: 1.65 }}>{teaser}</p>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '1.25rem' }}>
            <a
              href={`/work/${slug}`}
              onClick={e => e.stopPropagation()}
              style={{ fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', letterSpacing: '.1em', textTransform: 'uppercase', color: 'var(--color-cherry)', textDecoration: 'none' }}
            >
              View project →
            </a>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: '.55rem', letterSpacing: '.08em', color: 'rgba(26,22,18,.35)' }}>← tap back</span>
          </div>
        </div>
      </div>
    </div>
  );
}

const STATUS_FILTERS = [
  { id: 'all',     label: 'All work' },
  { id: 'shipped', label: 'Shipped' },
  { id: 'planned', label: 'Coming soon' },
];

const FILTERS = [
  { id: 'all',        label: 'All',              dot: '#E54B3C' },
  { id: 'fullstack',  label: 'Full-Stack Dev',   dot: '#E54B3C' },
  { id: 'ux',         label: 'UI/UX',            dot: '#E54B3C' },
  { id: 'mobile',     label: 'Mobile Apps',      dot: '#EE7BA8' },
  { id: 'data',       label: 'Data & Analytics', dot: '#6B7A3F' },
  { id: 'ai',         label: 'AI',               dot: '#B9A6E0' },
  { id: 'consulting', label: 'Consulting',        dot: '#e4d837' },
];

function WorkPage() {
  const [status, setStatus] = useState('all');
  const [filter, setFilter] = useState('all');

  const matchCat = (p) => filter === 'all' || (Array.isArray(p.category) ? p.category.includes(filter) : p.category === filter);
  const shipped  = (window.PROJECTS || []).filter(matchCat);
  const upcoming = (window.UPCOMING  || []).filter(matchCat);

  const showShipped = status === 'all' || status === 'shipped';
  const showPlanned = status === 'all' || status === 'planned';

  return (
    <>
      <Nav />
      <main className="al-container" style={{ paddingTop: 'clamp(2rem,5vw,4rem)', paddingBottom: 'clamp(3rem,7vw,6rem)' }}>
        <Breadcrumb trail={[{ label: 'Home', href: '/home' }, { label: 'Work' }]} />

        <div style={{ marginBottom: '3rem' }}>
          <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '.75rem' }}>02 / Work</p>
          <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-4xl)', letterSpacing: '-.03em', lineHeight: 1, marginBottom: '1rem' }}>
            Work that <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>ships</em>, and work in the pipeline.
          </h1>
          <p style={{ color: '#3a3530', lineHeight: 1.7, maxWidth: 560 }}>
            Shipped projects and upcoming work across UI/UX, data analytics and software development.
          </p>
        </div>

        <div style={{ display: 'flex', gap: '.5rem', flexWrap: 'wrap', marginBottom: '1.25rem', paddingBottom: '1.25rem', borderBottom: '1px solid rgba(26,22,18,.1)' }}>
          {STATUS_FILTERS.map(f => (
            <button key={f.id} onClick={() => setStatus(f.id)} className={`al-pill${status === f.id ? ' active' : ''}`}>{f.label}</button>
          ))}
        </div>
        <FilterBar filters={FILTERS} active={filter} onChange={setFilter} />

        {showShipped && shipped.length > 0 && (
          <div className="al-subsection">
            <div className="al-subsection__head">
              <span className="al-subsection__label">Shipped <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>work</em></span>
              <span className="al-subsection__count">{shipped.length} project{shipped.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="al-grid-3">
              {shipped.map(p => <ProjectCard key={p.id} project={p} featured={p.featured} />)}
            </div>
          </div>
        )}

        {showPlanned && upcoming.length > 0 && (
          <div className="al-subsection">
            <div className="al-subsection__head">
              <span className="al-subsection__label">In the <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>pipeline</em></span>
              <span className="al-subsection__count">{upcoming.length} project{upcoming.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="al-grid-3">
              {upcoming.map(p => <UpcomingCard key={p.id} project={p} />)}
            </div>
          </div>
        )}

        {(showShipped ? shipped.length : 0) + (showPlanned ? upcoming.length : 0) === 0 && (
          <p style={{ color: '#6b6460', marginTop: '3rem' }}>No projects match that filter.</p>
        )}
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WorkPage />);
</script>
</body>
</html>
