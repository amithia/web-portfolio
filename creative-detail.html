<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Creative · Amithi Liyanagamage</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Bits.jsx"></script>
<script type="text/babel" src="components/AboutFooter.jsx"></script>
<script type="text/babel" src="components/DetailParts.jsx"></script>

<script type="text/babel">
function CreativeDetail() {
  const slug = useSlug();
  const idx = (window.CREATIVE || []).findIndex(c => c.slug === slug);
  const item = idx >= 0 ? window.CREATIVE[idx] : null;

  React.useEffect(() => {
    if (item) document.title = `${item.title} · Amithi Liyanagamage`;
  }, [item]);

  if (!item) {
    return (
      <>
        <Nav />
        <NotFound backHref="beyond-work.html" backLabel="Back to Beyond Work" />
        <Footer />
      </>
    );
  }

  const tone = item.tone || 'bubblegum';
  const prev = idx > 0 ? window.CREATIVE[idx - 1] : null;
  const next = idx < window.CREATIVE.length - 1 ? window.CREATIVE[idx + 1] : null;

  return (
    <>
      <Nav />
      <main className="al-container">
        <Breadcrumb trail={[
          { label: 'Index', href: 'index.html' },
          { label: 'Beyond Work', href: 'beyond-work.html' },
          { label: 'Creative' },
        ]} />

        <header className="al-detail-header">
          <div>
            <div className="al-detail-header__eyebrow">
              <span className="badge" style={{ background: `var(--color-${tone})`, color: '#1A1612' }}>
                CREATIVE WORK
              </span>
              {item.meta}
            </div>
            <h1 className="al-detail-header__title">{item.title}</h1>
            <p className="al-detail-header__lede">{item.lede || item.desc}</p>
          </div>
          <div className="al-detail-header__meta">
            <div className="al-detail-header__row">
              <span className="al-detail-header__lbl">Type</span>
              <span className="al-detail-header__val">Creative work</span>
            </div>
            <div className="al-detail-header__row">
              <span className="al-detail-header__lbl">Details</span>
              <span className="al-detail-header__val">{item.meta}</span>
            </div>
          </div>
        </header>

        <div className={`al-detail-hero al-detail-hero--${tone}`} style={{ fontSize: '5rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ opacity: 0.35, fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'clamp(4rem,10vw,7rem)', letterSpacing: '-0.04em', color: '#1A1612' }}>✦</span>
        </div>

        {item.sections && item.sections.length > 0 ? (
          <article className="al-article">
            {item.sections.map((s, i) => {
              if (s.kind === 'metrics') return <MetricsRow key={i} items={s.items} />;
              if (s.kind === 'pull') return <blockquote key={i} className="al-pull">{s.text}</blockquote>;
              return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag}</div>
                  <div className="al-block__body">
                    <h3>{s.title}</h3>
                    <p>{s.body}</p>
                  </div>
                </section>
              );
            })}
          </article>
        ) : (
          <section className="al-block" style={{ marginTop: '3rem' }}>
            <div className="al-block__tag">About this work</div>
            <div className="al-block__body">
              <h3>More detail <em>coming soon</em>.</h3>
              <p>{item.desc}</p>
            </div>
          </section>
        )}

        <div style={{ marginTop: '2.5rem' }}>
          <Btn href="beyond-work.html" variant="cherry">← Back to Beyond Work</Btn>
        </div>

        <NextPrev
          prev={prev}
          next={next}
          prevLabel="Previous"
          nextLabel="Next"
          hrefFor={(c) => `creative-detail?id=${c.slug}`}
        />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CreativeDetail />);
</script>
</body>
</html>
