<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyond Work · Amithi Liyanagamage</title>
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
function WebPrototypeEmbed({ src }) {
  const viewportRef = React.useRef(null);
  React.useLayoutEffect(() => {
    const el = viewportRef.current;
    if (!el) return;
    const update = () => {
      const scale = el.offsetWidth / 1440;
      const iframe = el.querySelector('iframe');
      if (iframe) iframe.style.transform = `scale(${scale})`;
      el.style.height = Math.round(860 * scale) + 'px';
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div className="al-prototype__browser">
      <div className="al-prototype__browser-bar">
        <div className="al-prototype__browser-dots">
          <span className="al-prototype__browser-dot"/><span className="al-prototype__browser-dot"/><span className="al-prototype__browser-dot"/>
        </div>
        <div className="al-prototype__browser-url">canberraartmuseum.org</div>
      </div>
      <div ref={viewportRef} className="al-prototype__browser-viewport">
        <iframe src={src} title="CAM website prototype"/>
      </div>
    </div>
  );
}

function BeyondWorkDetail() {
  const slug = useSlug();

  const learningIdx = (window.LEARNING || []).findIndex(l => l.slug === slug);
  const creativeIdx = (window.CREATIVE || []).findIndex(c => c.slug === slug);
  const isLearning  = learningIdx >= 0;
  const isCreative  = creativeIdx >= 0;

  const item = isLearning ? window.LEARNING[learningIdx]
             : isCreative ? window.CREATIVE[creativeIdx]
             : null;
  const idx  = isLearning ? learningIdx : creativeIdx;
  const arr  = isLearning ? (window.LEARNING || []) : (window.CREATIVE || []);

  React.useEffect(() => {
    if (item) document.title = `${item.title} · Amithi Liyanagamage`;
  }, [item]);

  React.useEffect(() => {
    if (item && item.credlyBadgeId) {
      const script = document.createElement('script');
      script.src = '//cdn.credly.com/assets/utilities/embed.js';
      script.async = true;
      document.body.appendChild(script);
      return () => { document.body.removeChild(script); };
    }
  }, []);

  if (!item) {
    return (
      <>
        <Nav />
        <NotFound backHref="/beyond-work" backLabel="Back to Beyond Work" />
        <Footer />
      </>
    );
  }

  const tone = item.tone || (isLearning ? 'cherry' : 'bubblegum');
  const prev = idx > 0 ? arr[idx - 1] : null;
  const next = idx < arr.length - 1 ? arr[idx + 1] : null;

  return (
    <>
      <Nav />
      <main className="al-container">
        <Breadcrumb trail={[
          { label: 'Home', href: '/home' },
          { label: 'Beyond Work', href: '/beyond-work' },
          { label: isLearning ? 'Learning' : 'Creative' },
        ]} />

        <header className="al-detail-header">
          <div>
            <div className="al-detail-header__eyebrow">
              {isLearning ? (
                <>
                  <span className="badge" style={{
                    background: item.status === 'complete' ? 'var(--color-moss)' : `var(--color-${tone})`,
                    color: (item.status === 'complete' || tone === 'ink') ? '#FCF7E5' : '#1A1612'
                  }}>
                    {item.status === 'complete' ? 'COMPLETED' : item.status === 'active' ? 'IN PROGRESS' : 'PLANNED'}
                  </span>
                  {item.provider}{item.platform ? ` · ${item.platform}` : ''}
                </>
              ) : (
                <>
                  <span className="badge" style={{ background: `var(--color-${tone})`, color: '#1A1612' }}>
                    CREATIVE WORK
                  </span>
                  {item.meta}
                </>
              )}
            </div>
            <h1 className="al-detail-header__title">{item.title}</h1>
            <p className="al-detail-header__lede">{item.lede || item.desc}</p>
          </div>

          <div className="al-detail-header__meta">
            {isLearning ? (
              <>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Provider</span>
                  <span className="al-detail-header__val">{item.provider}</span>
                </div>
                {item.platform && (
                  <div className="al-detail-header__row">
                    <span className="al-detail-header__lbl">Platform</span>
                    <span className="al-detail-header__val">{item.platform}</span>
                  </div>
                )}
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Status</span>
                  <span className="al-detail-header__val">
                    {item.status === 'complete' ? 'Completed' : item.status === 'active' ? 'In progress' : 'Planned'}
                  </span>
                </div>
                {item.credlyBadgeId && (
                  <div style={{ marginTop: 'var(--space-4)' }}>
                    <div
                      data-iframe-width="150"
                      data-iframe-height="270"
                      data-share-badge-id={item.credlyBadgeId}
                      data-share-badge-host="https://www.credly.com"
                    />
                  </div>
                )}
              </>
            ) : (
              <>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Type</span>
                  <span className="al-detail-header__val">Creative work</span>
                </div>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Details</span>
                  <span className="al-detail-header__val">{item.meta}</span>
                </div>
              </>
            )}
          </div>
        </header>

        {item.heroImg ? (
          <div className="al-detail-hero al-detail-hero--photo" style={{ aspectRatio: '16/7', minHeight: 280 }}>
            <img src={item.heroImg} alt={item.title} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
          </div>
        ) : isLearning && item.glyph ? (
          <div className={`al-detail-hero al-detail-hero--${tone}`}>
            {(() => { const g = HERO_GLYPHS[item.glyph] || HERO_GLYPHS.compass;
              return typeof g === 'string'
                ? <img className="al-detail-hero__glyph" src={g} alt="" />
                : <svg className="al-detail-hero__glyph" viewBox="0 0 40 40">{g}</svg>;
            })()}
          </div>
        ) : !isLearning ? (
          <div className={`al-detail-hero al-detail-hero--${tone}`} style={{ fontSize: '5rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ opacity: 0.35, fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'clamp(4rem,10vw,7rem)', letterSpacing: '-0.04em', color: '#1A1612' }}>✦</span>
          </div>
        ) : null}

        {item.sections && item.sections.length > 0 ? (
          <article className="al-article">
            {item.sections.map((s, i) => {
              if (s.kind === 'metrics') return <MetricsRow key={i} items={s.items} />;
              if (s.kind === 'pull') return <blockquote key={i} className="al-pull">{s.text}</blockquote>;
              if (s.kind === 'callout') return <div key={i} className="al-callout">{s.text}</div>;

              if (s.kind === 'process-heading') return (
                <div key={i} className="al-process-heading">
                  <span className="al-process-heading__num">{s.num}.</span>
                  <span className="al-process-heading__title">{s.title}</span>
                </div>
              );

              if (s.kind === 'photo-context') return (
                <div key={i} className="al-photo-context">
                  <img src={s.src} alt={s.alt || ''} loading="lazy" />
                </div>
              );

              if (s.kind === 'takeaways') return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag || 'Takeaways'}</div>
                  <div className="al-block__body">
                    {s.title && <h3 dangerouslySetInnerHTML={{ __html: s.title }} />}
                    <div className="al-takeaways-list">
                      {(s.items || []).map((t, j) => (
                        <div key={j} className="al-takeaway">
                          <div className="al-takeaway__num">{t.num || `0${j+1}`}</div>
                          <div className="al-takeaway__body">
                            {t.title && <h4>{t.title}</h4>}
                            <p>{t.text}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>
              );

              if (s.kind === 'images') return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag}</div>
                  <div className="al-block__body">
                    {s.title && <h3 dangerouslySetInnerHTML={{ __html: s.title }} />}
                    <div className={`al-image-gallery${s.layout === 'logos' ? ' al-image-gallery--logos' : ''}`}>
                      {(s.items || []).map((img, j) => (
                        <figure key={j}>
                          <img src={img.src} alt={img.caption || ''} loading="lazy" />
                          {img.caption && <figcaption>{img.caption}</figcaption>}
                        </figure>
                      ))}
                    </div>
                  </div>
                </section>
              );

              if (s.kind === 'prototype') return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag}</div>
                  <div className="al-block__body">
                    <h3 dangerouslySetInnerHTML={{ __html: s.title }} />
                    {s.device === 'web'
                      ? <WebPrototypeEmbed src={s.src} />
                      : <div className="al-prototype__embed"><iframe src={s.src} title={s.title} /></div>
                    }
                    {s.caption && <p className="al-prototype__caption">{s.caption}</p>}
                  </div>
                </section>
              );

              return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag}</div>
                  <div className="al-block__body">
                    <h3 dangerouslySetInnerHTML={{ __html: s.title }} />
                    {Array.isArray(s.body)
                      ? s.body.map((part, j) =>
                          typeof part === 'string'
                            ? <p key={j}>{part}</p>
                            : <ul key={j} className="al-block__list">{part.items.map((li, k) => <li key={k}>{li}</li>)}</ul>
                        )
                      : <p>{s.body}</p>}
                  </div>
                </section>
              );
            })}
          </article>
        ) : (
          <section className="al-block" style={{ marginTop: '3rem' }}>
            <div className="al-block__tag">{isLearning ? 'Coming soon' : 'About this work'}</div>
            <div className="al-block__body">
              <h3>{isLearning ? <>Notes on this one are <em>in the works</em>.</> : <>More detail <em>coming soon</em>.</>}</h3>
              <p>{item.desc}</p>
            </div>
          </section>
        )}

        <div style={{ marginTop: '2.5rem' }}>
          <Btn href="/beyond-work" variant="cherry">← Back to Beyond Work</Btn>
        </div>

        <NextPrev
          prev={prev}
          next={next}
          prevLabel="Previous"
          nextLabel="Next"
          hrefFor={(x) => `/beyond-work/${x.slug}`}
        />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BeyondWorkDetail />);
</script>
</body>
</html>
