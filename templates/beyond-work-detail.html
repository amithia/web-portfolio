<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyond Work · Amithi Liyanagamage</title>
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/detail.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
function BeyondWorkDetail() {
  const slug = useSlug();

  const learningIdx = (window.LEARNING || []).findIndex(l => l.slug === slug);
  const creativeIdx = (window.CREATIVE || []).findIndex(c => c.slug === slug);
  const isLearning  = learningIdx >= 0;
  const isCreative  = creativeIdx >= 0;

  const item = isLearning ? window.LEARNING[learningIdx]
             : isCreative ? window.CREATIVE[creativeIdx]
             : null;
  const idx  = isLearning ? learningIdx : creativeIdx;
  const arr  = isLearning ? (window.LEARNING || []) : (window.CREATIVE || []);

  React.useEffect(() => {
    if (item) document.title = `${item.title} · Amithi Liyanagamage`;
  }, [item]);

  if (!item) {
    return (
      <>
        <Nav />
        <NotFound backHref="/beyond-work" backLabel="Back to Beyond Work" />
        <Footer />
      </>
    );
  }

  const tone = item.tone || (isLearning ? 'cherry' : 'bubblegum');
  const prev = idx > 0 ? arr[idx - 1] : null;
  const next = idx < arr.length - 1 ? arr[idx + 1] : null;

  return (
    <>
      <Nav />
      <main className="al-container">
        <Breadcrumb trail={[
          { label: 'Home', href: '/home' },
          { label: 'Beyond Work', href: '/beyond-work' },
          { label: isLearning ? 'Learning' : 'Creative' },
        ]} />

        <header className="al-detail-header">
          <div>
            <div className="al-detail-header__eyebrow">
              {isLearning ? (
                <>
                  <span className="badge" style={{ background: `var(--color-${tone})`, color: tone === 'ink' ? '#FCF7E5' : '#1A1612' }}>
                    {item.status === 'active' ? 'IN PROGRESS' : 'PLANNED'}
                  </span>
                  {item.provider}{item.platform ? ` · ${item.platform}` : ''}
                </>
              ) : (
                <>
                  <span className="badge" style={{ background: `var(--color-${tone})`, color: '#1A1612' }}>
                    CREATIVE WORK
                  </span>
                  {item.meta}
                </>
              )}
            </div>
            <h1 className="al-detail-header__title">{item.title}</h1>
            <p className="al-detail-header__lede">{item.lede || item.desc}</p>
          </div>

          <div className="al-detail-header__meta">
            {isLearning ? (
              <>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Provider</span>
                  <span className="al-detail-header__val">{item.provider}</span>
                </div>
                {item.platform && (
                  <div className="al-detail-header__row">
                    <span className="al-detail-header__lbl">Platform</span>
                    <span className="al-detail-header__val">{item.platform}</span>
                  </div>
                )}
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Status</span>
                  <span className="al-detail-header__val">{item.status === 'active' ? 'In progress' : 'Planned'}</span>
                </div>
                {item.progress != null && (
                  <div className="al-detail-header__row">
                    <span className="al-detail-header__lbl">Progress</span>
                    <span className="al-detail-header__val">{item.progress}%</span>
                  </div>
                )}
              </>
            ) : (
              <>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Type</span>
                  <span className="al-detail-header__val">Creative work</span>
                </div>
                <div className="al-detail-header__row">
                  <span className="al-detail-header__lbl">Details</span>
                  <span className="al-detail-header__val">{item.meta}</span>
                </div>
              </>
            )}
          </div>
        </header>

        {isLearning ? (
          <div className={`al-detail-hero al-detail-hero--${tone}`}>
            <svg className="al-detail-hero__glyph" viewBox="0 0 40 40">
              {HERO_GLYPHS[item.glyph] || HERO_GLYPHS.compass}
            </svg>
          </div>
        ) : (
          <div className={`al-detail-hero al-detail-hero--${tone}`} style={{ fontSize: '5rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ opacity: 0.35, fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'clamp(4rem,10vw,7rem)', letterSpacing: '-0.04em', color: '#1A1612' }}>✦</span>
          </div>
        )}

        {item.sections && item.sections.length > 0 ? (
          <article className="al-article">
            {item.sections.map((s, i) => {
              if (s.kind === 'metrics') return <MetricsRow key={i} items={s.items} />;
              if (s.kind === 'pull') return <blockquote key={i} className="al-pull">{s.text}</blockquote>;
              return (
                <section key={i} className="al-block">
                  <div className="al-block__tag">{s.tag}</div>
                  <div className="al-block__body">
                    <h3>{s.title}</h3>
                    <p>{s.body}</p>
                  </div>
                </section>
              );
            })}
          </article>
        ) : (
          <section className="al-block" style={{ marginTop: '3rem' }}>
            <div className="al-block__tag">{isLearning ? 'Coming soon' : 'About this work'}</div>
            <div className="al-block__body">
              <h3>{isLearning ? <>Notes on this one are <em>in the works</em>.</> : <>More detail <em>coming soon</em>.</>}</h3>
              <p>{item.desc}</p>
            </div>
          </section>
        )}

        <div style={{ marginTop: '2.5rem' }}>
          <Btn href="/beyond-work" variant="cherry">← Back to Beyond Work</Btn>
        </div>

        <NextPrev
          prev={prev}
          next={next}
          prevLabel="Previous"
          nextLabel="Next"
          hrefFor={(x) => `/beyond-work/${x.slug}`}
        />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BeyondWorkDetail />);
</script>
</body>
</html>
