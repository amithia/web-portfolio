<style>
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(2rem,5vw,5rem); align-items: start; margin-bottom: 4rem; }
.about-photo { background: var(--color-mist); border: 2px solid var(--color-ink); border-radius: 8px; overflow: hidden; position: sticky; top: 80px; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 4rem; font-weight: 900; color: rgba(26,22,18,.15); }
.about-photo img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
.skill-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1.5rem; }
.skill-item { padding: 1.25rem 1.5rem; border: 2px solid var(--color-ink); border-radius: 8px; position: relative; overflow: visible; transition: transform 0.18s ease; }
.skill-item:nth-child(odd):hover  { transform: rotate(2deg)  scale(1.02); }
.skill-item:nth-child(even):hover { transform: rotate(-2deg) scale(1.02); }
.skill-item__num { font-family: var(--font-mono); font-size: .65rem; letter-spacing: .1em; color: var(--color-cherry); margin-bottom: .4rem; }
.skill-item__name { font-family: var(--font-display); font-weight: 900; font-size: var(--text-lg); letter-spacing: -.02em; line-height: 1.1; }
.skill-item__sticker { position: absolute; top: 10px; right: 14px; width: 62px; height: 62px; rotate: 10deg; opacity: 0; transform: scale(0.65); transition: opacity 0.2s ease, transform 0.2s ease; pointer-events: none; filter: drop-shadow(2px 2px 0 #1A1612); z-index: 10; }
.skill-item__sticker img { width: 100%; height: 100%; display: block; }
.skill-item:hover .skill-item__sticker { opacity: 1; transform: scale(1); }
@media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; } .about-photo { position: relative; top: 0; aspect-ratio: 4/3; min-height: unset; } .skill-row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="/data.js"></script>
<script type="text/babel" src="/components/Nav.jsx"></script>
<script type="text/babel" src="/components/Bits.jsx"></script>
<script type="text/babel" src="/components/AboutFooter.jsx"></script>
<script type="text/babel" src="/components/DetailParts.jsx"></script>

<script type="text/babel">
function AboutPage() {
  return (
    <>
      <Nav />
      <main>
        <div className="al-container" style={{ paddingTop: 'clamp(2rem,5vw,4rem)', paddingBottom: 'clamp(3rem,7vw,6rem)' }}>
          <Breadcrumb trail={[{ label: 'Home', href: '/home' }, { label: 'About' }]} />

          <div style={{ marginBottom: '3rem' }}>
            <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '.75rem' }}>01 / About</p>
            <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-4xl)', letterSpacing: '-.03em', lineHeight: 1, marginBottom: '1rem' }}>
              Hello, my name is <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>Amithi</em>
            </h1>
            <p style={{ color: '#3a3530', lineHeight: 1.7, maxWidth: 560 }}>
              Developer working at the intersection of design, data and software.
            </p>
          </div>

          <div className="about-grid">
            <div className="about-photo">
              <img src="/assets/photos/about-profile.jpg" alt="Me standing in the rain in Vietnam." onError={(e) => { e.target.style.display='none'; }} />
              AL
            </div>
            <div>
              <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '1rem' }}>The longer version</p>
              <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-2xl)', letterSpacing: '-.03em', lineHeight: 1.05, marginBottom: '1.5rem' }}>
                Raised up around the world,
                <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}> building in Canberra.</em>
              </h2>
              <p style={{ marginBottom: '1.5rem', color: '#3a3530', lineHeight: 1.7 }}>
                I grew up around the world and moved to Australia to study Computing at the Australian National University. What started as a degree became a full-time commitment to building things that actually work for people. Somewhere along the way I fell in love with the intersection of engineering and design. I now work at ANU in Digital Strategy and Analytics, building student-facing web products and experiences across the university, where the problems are real, the users are many and the stakes are high.
              </p>
              <p style={{ marginBottom: '2rem', color: '#3a3530', lineHeight: 1.7 }}>
                Outside of work I'm usually reading something taking me far too long or convincing myself a fourth coffee is a reasonable productivity strategy. When I'm not at a desk, I'm most likely on a plane somewhere, adding another country to the list.
              </p>
              <div className="al-countries" style={{ marginBottom: '2rem' }}>
                <span className="al-country"><span className="dot" style={{ background: '#E54B3C' }}></span>Sri Lanka</span>
                <span className="al-country"><span className="dot" style={{ background: '#6B7A3F' }}></span>Australia</span>
                <span className="al-country"><span className="dot" style={{ background: '#1A1612' }}></span>+ exploring</span>
              </div>
              <Btn href="/contact" variant="primary">Ask me a question</Btn>
            </div>
          </div>

          <div style={{ borderTop: '1px solid rgba(26,22,18,.12)', paddingTop: '3rem' }}>
            <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '1rem' }}>What I'm doing</p>
            <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-2xl)', letterSpacing: '-.03em', lineHeight: 1, marginBottom: '2rem' }}>
              My six <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>interests</em>
            </h2>
            <div className="skill-row">
              {[
                ['01', 'UI / UX Design',                      '/assets/motifs/sticker-cursor.svg'],
                ['02', 'Data & Analytics',                    '/assets/motifs/sticker-donut-chart.svg'],
                ['03', 'AI Ethics & Policy',                  '/assets/motifs/sticker-scales.svg'],
                ['04', 'Educational Technology & Research',   '/assets/motifs/sticker-graduation-cap.svg'],
                ['05', 'Software Development',                '/assets/motifs/sticker-code-window.svg'],
                ['06', 'Start-up Growth',                     '/assets/motifs/sticker-growth-chart.svg'],
              ].map(([num, name, src]) => (
                <div key={num} className="skill-item">
                  <div className="skill-item__num">{num}</div>
                  <div className="skill-item__name">{name}</div>
                  <div className="skill-item__sticker"><img src={src} alt="" /></div>
                </div>
              ))}
            </div>
          </div>

          <div id="focus" style={{ borderTop: '1px solid rgba(26,22,18,.12)', paddingTop: '3rem', marginTop: '3rem' }}>
            <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '1rem' }}>What I build</p>
            <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-2xl)', letterSpacing: '-.03em', lineHeight: 1, marginBottom: '2.5rem' }}>
              Four <em style={{ fontFamily: 'var(--font-accent)', fontStyle: 'italic', fontWeight: 400, color: 'var(--color-cherry)' }}>focuses</em>
            </h2>
            {(window.PRACTICES || []).map((p, i) => (
              <div key={p.slug} id={`focus-${p.slug}`} style={{ marginBottom: '3rem', paddingBottom: '3rem', borderBottom: i < (window.PRACTICES.length - 1) ? '1px solid rgba(26,22,18,.1)' : 'none' }}>
                <p className="al-eyebrow" style={{ color: 'var(--color-cherry)', marginBottom: '.5rem' }}>{p.tag}</p>
                <h3 style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 'var(--text-xl)', letterSpacing: '-.02em', lineHeight: 1.1, marginBottom: '1rem' }}>{p.title}</h3>
                <p style={{ color: '#3a3530', lineHeight: 1.7, marginBottom: '1.5rem', maxWidth: 640 }}>{p.body}</p>
                {p.methods && (
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: '1rem' }}>
                    {p.methods.map(m => (
                      <div key={m.name} style={{ padding: '1rem 1.25rem', border: '1.5px solid rgba(26,22,18,.15)', borderRadius: 8 }}>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 'var(--text-sm)', marginBottom: '.35rem' }}>{m.name}</div>
                        <div style={{ fontSize: 'var(--text-xs)', color: '#6b645b', lineHeight: 1.5 }}>{m.detail}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ borderTop: '1px solid rgba(26,22,18,.12)', paddingTop: '3rem', marginTop: '3rem' }}>
            <div className="al-sub-header" style={{ marginTop: 0 }}>
              <h3 className="al-sub-header__title">Current <em>obsessions</em></h3>
            </div>
            <div className="al-widgets">
              <NowReading />
              <SpotifyWidget />
              <Stamp />
            </div>
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AboutPage />);
</script>
</body>
</html>
